<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo" style="color:blue"></p>
    <button onclick="add()">increase button</button>
    <script>
        size=15
        function add(){
        
        obj=document.getElementById('demo')
        obj.innerHTML='hello'
        obj.style.fontSize=size+"px"
        if(size<=50){
            size++
        }
        setInterval(add,50)
    }
   
    </script>
</body>
</html>
